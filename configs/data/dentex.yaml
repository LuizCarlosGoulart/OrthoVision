# DENTEX dataset source specification (primary, v1).
# License: CC-BY. Direct download; no access form required.
dataset:
  name: dentex
  role: primary
  license: CC-BY
  modality: panoramic_xray
  language: en
  specialty: dentistry

  # Source of record. Checksums are filled in by the ingestor on first download
  # and then treated as immutable; a mismatch on re-download is a hard failure.
  source:
    provider: huggingface
    repo_id: ibrahimhamamci/DENTEX
    # Mirrors kept for provenance / reproducibility.
    mirrors:
      - https://zenodo.org/records/7812323
      - https://dentex.grand-challenge.org/data/

  # DENTEX hierarchical subsets. Only `diagnosis` carries the 4-pathology labels
  # used by the v1 supervised task. The other two are reserved for optional
  # auxiliary pretext tasks and, if used, MUST enter the same patient-grouping
  # table as the split (no data leaks in as "extra").
  subsets:
    quadrant:
      images: 693
      labels: [quadrant]
    quadrant_enumeration:
      images: 634
      labels: [quadrant, enumeration]
    diagnosis:
      images: 1005
      labels: [quadrant, enumeration, diagnosis]
      use: v1

  # Archive extraction map. DENTEX ships its images inside zips; the ingestor
  # extracts matching members into the raw store at <split>/<subset>/<basename>
  # (annotations under <split>/<subset>/annotations/). Members matching `exclude`
  # anywhere in their path are skipped. `unlabelled` (no diagnosis labels) and
  # notebook checkpoints are dropped for v1.
  exclude:
    - ".ipynb_checkpoints/"
    - "unlabelled/"
  archives:
    training_data.zip:
      - { include: "training_data/quadrant-enumeration-disease/xrays/", split: train, subset: diagnosis }
      - { include: "training_data/quadrant/xrays/",                     split: train, subset: quadrant }
      - { include: "training_data/quadrant_enumeration/xrays/",         split: train, subset: quadrant_enumeration }
      - { include: "training_data/quadrant-enumeration-disease/train_quadrant_enumeration_disease.json", split: train, subset: diagnosis, kind: annotation }
      - { include: "training_data/quadrant/train_quadrant.json",                              split: train, subset: quadrant, kind: annotation }
      - { include: "training_data/quadrant_enumeration/train_quadrant_enumeration.json",      split: train, subset: quadrant_enumeration, kind: annotation }
    test_data.zip:
      - { include: "disease/input/", split: test, subset: diagnosis }
      - { include: "disease/label/", split: test, subset: diagnosis, kind: annotation }
    validation_data.zip:
      - { include: "validation_data/quadrant_enumeration_disease/xrays/", split: val, subset: diagnosis }

  # Diagnostic label space — the canonical multi-label target.
  pathologies:
    - { key: caries,            granularity: local }
    - { key: deep_caries,       granularity: local }
    - { key: periapical_lesion, granularity: local }
    - { key: impacted_tooth,    granularity: global }

  reliability: strong   # expert-annotated; authoritative ground truth
