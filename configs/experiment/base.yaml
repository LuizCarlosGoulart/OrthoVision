# Base experiment template. Concrete experiments inherit this and override the
# strategy / backbone. Every run is identified by run_id = date + config_hash + seed.
experiment:
  seed: 1337
  backbone: biomedclip        # configs/model/*.yaml
  strategy: zero_shot         # zero_shot | linear_probe | coop | lora | lora_coop
  task: multilabel            # 4-pathology multi-label
  loss: bce_with_logits       # multi-label; not softmax
  prompts:
    template: "a panoramic dental x-ray showing {pathology}"
  # Per-class positive prompts for zero-shot scoring (cosine similarity of the
  # image embedding to each prompt is the per-class score; AUC is rank-based so
  # no cross-class calibration is needed).
  class_prompts:
    caries: "a panoramic dental radiograph showing dental caries"
    deep_caries: "a panoramic dental radiograph showing deep dental caries reaching the pulp"
    periapical_lesion: "a panoramic dental radiograph showing a periapical lesion at the tooth root"
    impacted_tooth: "a panoramic dental radiograph showing an impacted tooth"

  # Provenance recorded with every run (see §8 of the ADD).
  provenance:
    config_hash: auto
    data_manifest_hash: auto
    test_split_hash: auto

  # Feature cache is only valid when the image encoder is frozen (zero_shot,
  # linear_probe, coop). Must be disabled/invalidated for lora / full fine-tune.
  feature_cache:
    enabled_when_encoder_frozen: true
